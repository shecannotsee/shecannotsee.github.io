hero:
  image: /logo.png
  image_alt: shecannotsee
  intro: >
    我主要做 C++、Linux、构建系统和服务端工程相关的开发，也会把零散但有用的
    实践经验整理成文章和项目笔记。
  facts:
    - 数学、金融学与计算机背景，目前专注软件开发与工程实践
    - 长期记录 C++、协议、构建流程、项目结构与 Linux 使用经验
    - 持续打磨一组以 she 开头命名的基础库与实验性项目
    - 关注可维护性、清晰接口和可以长期复用的工程组织方式

projects:
  intro: 我长期维护并持续实验下面这些项目和方向：
  groups:
    - title: Libraries & tools
      items:
        - name: sheBase64
          description: Base64 编解码实现，也是我试验项目结构、构建方式和测试组织的重要项目。
          url: https://github.com/shecannotsee/sheBase64
        - name: sheLog
          description: 采用生产者消费者模型的日志库，关注异步写入和接口清晰度。
          url: https://github.com/shecannotsee/sheLog
        - name: sheIni
          description: 在传统 ini 基础上扩展多级包含与数组等常用能力。
        - name: sheThreadPool
          description: 基于 C++11 的线程池方案，经常作为其他项目的底层依赖。
    - title: In progress
      items:
        - name: sheNet
          description: 面向 Linux 服务端场景的网络库，偏重基础通信能力而非跨平台。
        - name: sheRaft
          description: 仍以笔记和设计为主，计划在网络基础完善后继续推进。
        - name: data_structure_core
          description: 希望系统重写一批常见和困难数据结构，保持实现与命名风格统一。

