status:
  title: Current Focus
  items:
    - 使用 C++ 构建可长期维护的基础库与服务端组件
    - 持续整理 Linux、构建流程、网络与工具链笔记
    - 把零散经验沉淀成可以回查和复用的文章

highlights:
  - title: Background
    text: 数学、金融学与计算机背景，目前主要专注软件开发与工程实践。
  - title: Writing
    text: 文章主题集中在 C++、Linux、协议、性能、构建系统与项目结构。
  - title: Approach
    text: 优先记录能落地、能复用、能帮助自己长期维护项目的内容。

projects:
  title: Selected Projects
  items:
    - name: sheBase64
      status: stable experiment
      description: 用来试验项目结构、构建方式和测试组织的基础项目，也承担 Base64 编解码实现。
      url: https://github.com/shecannotsee/sheBase64
    - name: sheLog
      status: implemented
      description: 基于生产者消费者模型的日志库，关注异步写入、接口清晰度与可维护性。
      url: https://github.com/shecannotsee/sheLog
    - name: sheIni
      status: evolving
      description: 在传统 ini 格式基础上扩展多级包含和数组等常见能力，兼顾兼容性与实用性。
    - name: sheNet
      status: in progress
      description: 面向 Linux 服务端场景的网络库，偏重基础通信能力而非跨平台。
    - name: sheThreadPool
      status: utility
      description: 基于 C++11 的线程池方案，经常作为其他项目的底层依赖进行复用。

