{% assign profile = site.data.site_profile %}
<header class="site-header">
  <div class="site-header__inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav" aria-label="Primary">
      {% for item in profile.navigation %}
        {% assign item_path = item.url | replace: '.html', '/' %}
        <a
          class="site-nav__link{% if page.url == item.url or page.url == item_path %} is-active{% endif %}"
          href="{{ item.url | relative_url }}"
        >
          {{ item.title }}
        </a>
      {% endfor %}
    </nav>
  </div>
</header>
