<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />

  <title>
    {%- if page.title -%}
      {{ page.title }}
    {%- else -%}
      {{ site.title }}
    {%- endif -%}
  </title>

  {%-seo title=false-%}
  {%-feed_meta-%}

  <script>
    (function () {
      try {
        var root = document.documentElement;
        var savedTheme = localStorage.getItem("site-theme");
        var theme = savedTheme || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        var lang = localStorage.getItem("site-lang") || "zh";
        root.dataset.theme = theme;
        root.dataset.lang = lang;
        root.lang = lang === "en" ? "en" : "zh-CN";
        root.style.colorScheme = theme;
      } catch (error) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=STIX+Two+Text:wght@400..700&display=swap"
  />
  <link rel="shortcut icon" type="image/x-icon" href="{{ site.favicon | relative_url }}" />
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}" />
  <script defer src="{{ '/assets/js/site_preferences.js' | relative_url }}"></script>
</head>
