<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "zh-CN" }}">
  {%- include head.html -%}
  <body class="layout-{{ page.layout | slugify }}">
    <div class="site-shell">
      {%- include site_nav.html -%}
      <main class="site-main" aria-label="Content">
        {{ content }}
      </main>
      {%- include site_footer.html -%}
    </div>

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}

    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
